name: Full Security Scan

on:
  workflow_dispatch:

jobs:
  security-check:
    name: Security Scan & Org Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 1. Gitleaks ---
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          format: sarif
          report_path: gitleaks.sarif

      # --- 2. Semgrep (SAST) ---
      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep --config auto --sarif -o semgrep.sarif || true

      # --- 3. Bandit (Python 审计) ---
      - name: Run Bandit
        run: |
          if [ -d backend ]; then
            pip install bandit bandit_sarif_formatter
            bandit -r ./backend -ll -f sarif -o bandit.sarif || true
          fi

      # --- 5. 上传至 Security 标签页 ---
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: . 

      # --- 6. 统计并发送飞书通知 ---
      - name: Send Feishu Notification
        if: always()
        run: |
          G_COUNT=$(if [ -f gitleaks.sarif ]; then jq '[.runs[].results[] // []] | length' gitleaks.sarif; else echo 0; fi)
          S_COUNT=$(if [ -f semgrep.sarif ]; then jq '[.runs[].results[] // []] | length' semgrep.sarif; else echo 0; fi)
          B_COUNT=$(if [ -f bandit.sarif ]; then jq '[.runs[].results[] // []] | length' bandit.sarif; else echo 0; fi)

          TOTAL=$((G_COUNT + S_COUNT + B_COUNT + N_COUNT))
          
          # 颜色逻辑：Gitleaks 发现泄露必红，其余发现风险橙色，无风险绿色
          if [ "$G_COUNT" -gt 0 ]; then COLOR="red"; STATUS="严重风险 (密钥泄露)"; 
          elif [ "$TOTAL" -gt 0 ]; then COLOR="orange"; STATUS="发现潜在风险"; 
          else COLOR="green"; STATUS="安全合规"; fi

          SECURITY_URL="${{ github.server_url }}/${{ github.repository }}/security/code-scanning"

          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "msg_type": "interactive",
            "card": {
              "config": { "wide_screen_mode": true },
              "header": {
                "title": { "tag": "plain_text", "content": "🛡️ ECHO-SIEM-Platform Full Scan ($STATUS)" },
                "template": "'$COLOR'"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**项目:** ${{ github.repository }}\n\n🔑 密钥泄露: **'$G_COUNT'**\n🔍 代码风险: **'$((S_COUNT + B_COUNT))'**\n📦 依赖风险: **'$N_COUNT'**"
                  }
                },
                { "tag": "hr" },
                {
                  "tag": "action",
                  "actions": [{
                    "tag": "button",
                    "text": { "tag": "plain_text", "content": "查看漏洞报告" },
                    "type": "primary",
                    "url": "'$SECURITY_URL'"
                  }]
                }
              ]
            }
          }' ${{ secrets.FEISHU_WEBHOOK_URL }}