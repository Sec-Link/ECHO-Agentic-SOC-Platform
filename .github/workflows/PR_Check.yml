name: PR Security Scan (Incremental & Private)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-checks:
    name: Security Scan & Private Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 1. 获取变动文件列表 ---
      - name: Get Changed Files
        id: changed-files
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | xargs)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      # --- 2. Gitleaks (增量扫描) ---
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_SUMMARY: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
        with:
          format: sarif
          report_path: gitleaks.sarif

      # --- 3. Semgrep ---
      - name: Run Semgrep (Incremental)
        run: |
          pip install semgrep
          CHANGED_FILES="${{ steps.changed-files.outputs.files }}"
          if [ -n "$CHANGED_FILES" ]; then
            semgrep --config auto $CHANGED_FILES --sarif -o semgrep.sarif || true
          fi

      # --- 4. Bandit (按需扫描) ---
      - name: Run Bandit
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^backend/"; then
            pip install bandit bandit_sarif_formatter
            bandit -r ./backend -ll -f sarif -o bandit.sarif || true
          fi

      # --- 6.Security Tab ---
      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: . 

      # --- 7. 发送飞书通知---
      - name: Send Feishu Notification
        if: always()
        run: |
          # 统计逻辑
          G_COUNT=$(jq '.runs[0].results | length // 0' gitleaks.sarif || echo 0)
          S_COUNT=$(if [ -f semgrep.sarif ]; then jq '[.runs[].results[] // []] | length' semgrep.sarif; else echo 0; fi)
          B_COUNT=$(if [ -f bandit.sarif ]; then jq '[.runs[].results[] // []] | length' bandit.sarif; else echo 0; fi)

          TOTAL=$((G_COUNT + S_COUNT + B_COUNT))
          
          # 颜色逻辑
          if [ "$G_COUNT" -gt 0 ]; then COLOR="red"; STATUS="紧急：PR 包含泄露密钥";
          elif [ "$TOTAL" -gt 0 ]; then COLOR="orange"; STATUS="注意：PR 引入安全风险";
          else COLOR="green"; STATUS="安全合规"; fi

          SECURITY_URL="${{ github.server_url }}/${{ github.repository }}/security/code-scanning"

          curl -X POST -H "Content-Type: application/json" \
          -d '{
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": { "tag": "plain_text", "content": "🛡️ PR 增量安全审计 ($STATUS)" },
                "template": "'$COLOR'"
              },
              "elements": [
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**项目:** ${{ github.repository }}\n**提交者:** ${{ github.actor }}\n**分支:** ${{ github.head_ref }} -> ${{ github.base_ref }}\n\n🔑 密钥泄露: **'$G_COUNT'**\n🔍 新增风险: **'$((S_COUNT + B_COUNT))'**\n📦 依赖风险: **'$SNYK_COUNT'**"
                  }
                },
                { "tag": "hr" },
                {
                  "tag": "action",
                  "actions": [{
                    "tag": "button",
                    "text": { "tag": "plain_text", "content": "查看 PR 安全详情" },
                    "type": "primary",
                    "url": "'$SECURITY_URL'"
                  }]
                }
              ]
            }
          }' ${{ secrets.FEISHU_WEBHOOK_URL }}