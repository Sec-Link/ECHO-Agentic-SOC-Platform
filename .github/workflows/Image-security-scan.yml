name: Image Security Scan (Private & Integrated)

on:
  workflow_run:
    workflows: ["Build Image"]
    types: [completed]
  workflow_dispatch:

jobs:
  scan-images:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [siem-backend, siem-frontend]
    
    permissions:
      contents: read
      security-events: write # 必须：用于上传镜像扫描结果到 Security 标签页

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # --- 1. Trivy 扫描并生成 SARIF (用于 Security Tab) ---
      - name: Run Trivy for Security Tab
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ALIYUN_REGISTRY }}/siem/${{ matrix.service }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # --- 2. Trivy 扫描并生成 JSON (用于飞书报数统计) ---
      - name: Run Trivy for Stats
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ALIYUN_REGISTRY }}/siem/${{ matrix.service }}:latest
          format: 'json'
          output: 'report.json'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # --- 3. 上传到 Security 标签页 (仅内部可见) ---
      - name: Upload Scan Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: ${{ matrix.service }} # 区分不同的服务镜像

      # --- 4. 处理数据发送飞书 (不留附件，不留摘要) ---
      - name: Notify Feishu
        if: always()
        run: |
          # 精确统计漏洞数量
          CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' report.json || echo 0)
          HIGH_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' report.json || echo 0)
          TOTAL=$((CRITICAL_COUNT + HIGH_COUNT))

          if [ "$TOTAL" -eq 0 ]; then
            COLOR="green"
            STATUS="安全合规"
            TITLE="✅ 镜像扫描通过: ${{ matrix.service }}"
          else
            COLOR="red"
            STATUS="发现 $TOTAL 个高危漏洞"
            TITLE="❌ 镜像安全告警: ${{ matrix.service }}"
          fi

          SECURITY_URL="${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=is:open+tool:Trivy"

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg color "$COLOR" \
            --arg detail "服务: \`${{ matrix.service }}\`\n致命漏洞 (Critical): **$CRITICAL_COUNT**\n高危漏洞 (High): **$HIGH_COUNT**\n\n请项目管理员及时在 GitHub Security 面板处理。" \
            --arg url "$SECURITY_URL" \
            '{
              "msg_type": "interactive",
              "card": {
                "header": { "template": $color, "title": { "tag": "plain_text", "content": $title } },
                "elements": [
                  { "tag": "div", "text": { "tag": "lark_md", "content": $detail } },
                  { "tag": "hr" },
                  {
                    "tag": "action",
                    "actions": [{
                      "tag": "button",
                      "text": { "tag": "plain_text", "content": "查看私密详情" },
                      "type": "primary",
                      "url": $url
                    }]
                  }
                ]
              }
            }')

          curl -X POST '${{ secrets.FEISHU_WEBHOOK_URL }}' \
          -H 'Content-Type: application/json' \
          -d "$PAYLOAD"